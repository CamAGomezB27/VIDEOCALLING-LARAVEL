<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta Virtual</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <script src="funciones.js" defer></script>
  </head>
  <body>
    <!-- ── LOBBY ── -->
    <div id="lobby">
      <div class="lobby-card">
        <div class="lobby-header">
          <div class="lobby-badge">LiveKit · Local</div>
          <div class="lobby-title">Consulta <span>Virtual</span></div>
          <div class="lobby-meta">Sistema de telemedicina · v0.1</div>
        </div>

        <div class="appt-input-group">
          <label>ID de cita</label>
          <input
            type="number"
            id="appointment-id"
            value="1"
            min="1"
            placeholder="Ej: 1"
          />
        </div>

        <div class="role-selector">
          <button class="role-btn patient" onclick="connect('patient')">
            <div class="role-icon">🧑‍💼</div>
            Paciente
          </button>
          <button class="role-btn doctor" onclick="connect('doctor')">
            <div class="role-icon">🩺</div>
            Médico
          </button>
        </div>

        <div class="status-bar">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">Listo para conectar</span>
        </div>
      </div>
    </div>

    <!-- ── ROOM ── -->
    <div id="room">
      <div class="topbar">
        <div class="topbar-left">
          <div class="topbar-logo">Consulta</div>
          <div class="topbar-divider"></div>
          <div class="room-name-tag" id="room-tag">—</div>
        </div>
        <div class="topbar-right">
          <div class="rec-indicator" id="rec-indicator">REC</div>
          <div class="timer" id="timer">00:00</div>
        </div>
      </div>

      <div id="video-grid">
        <div class="empty-state">
          <div class="big-icon">📡</div>
          <span>Conectando a la sala...</span>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl-btn" id="btn-mic" onclick="toggleMic()">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8" />
          </svg>
          Mic
        </button>

        <button class="ctrl-btn" id="btn-cam" onclick="toggleCam()">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M23 7l-7 5 7 5V7z" />
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
          </svg>
          Cámara
        </button>

        <div class="ctrl-sep"></div>

        <button
          class="ctrl-btn record-btn"
          id="btn-record"
          onclick="toggleRecording()"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="8" />
            <circle cx="12" cy="12" r="3" fill="currentColor" stroke="none" />
          </svg>
          Grabar
        </button>

        <div class="ctrl-sep"></div>

        <button class="ctrl-btn danger" onclick="leave()">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"
            />
          </svg>
          Salir
        </button>

        <div class="participant-count" id="participant-count">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          1 participante
        </div>
      </div>
    </div>

    <div id="toast"></div>
  </body>
</html>
