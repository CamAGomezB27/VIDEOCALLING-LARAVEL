<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta Virtual</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <script src="funciones.js" defer></script>
  </head>
  <body>
    <!-- ── PASO 1: elegir rol ── -->
    <div id="screen-role" class="screen active">
      <div class="brand">
        <div class="brand-dot"></div>
        <span>MediCall</span>
      </div>
      <div class="role-screen">
        <div class="role-header">
          <h1>Bienvenido</h1>
          <p>¿Cómo ingresas hoy?</p>
        </div>
        <div class="role-cards">
          <button class="role-card" onclick="selectRole('patient')">
            <div class="role-card-icon patient-icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
            </div>
            <div class="role-card-text">
              <strong>Soy paciente</strong>
              <span>Accede con tu correo y cédula</span>
            </div>
            <svg
              class="role-card-arrow"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M9 18l6-6-6-6" />
            </svg>
          </button>

          <button class="role-card" onclick="selectRole('doctor')">
            <div class="role-card-icon doctor-icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
              </svg>
            </div>
            <div class="role-card-text">
              <strong>Soy médico</strong>
              <span>Accede con tu correo y licencia</span>
            </div>
            <svg
              class="role-card-arrow"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M9 18l6-6-6-6" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- ── PASO 2: formulario según rol ── -->
    <div id="screen-form" class="screen">
      <div class="brand">
        <div class="brand-dot"></div>
        <span>MediCall</span>
      </div>
      <div class="form-screen">
        <button class="back-btn" onclick="goBack()">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M19 12H5M12 5l-7 7 7 7" />
          </svg>
          Volver
        </button>

        <div class="form-header">
          <div class="form-role-badge" id="form-role-badge">Paciente</div>
          <h2 id="form-title">Ingresa tus datos</h2>
          <p id="form-subtitle">
            Verificaremos tu identidad antes de la consulta
          </p>
        </div>

        <div class="form-card">
          <div class="field-group">
            <label for="input-email">Correo electrónico</label>
            <div class="input-wrapper">
              <svg
                class="input-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                />
                <polyline points="22,6 12,13 2,6" />
              </svg>
              <input
                type="email"
                id="input-email"
                placeholder="tu@correo.com"
                autocomplete="email"
              />
            </div>
          </div>

          <div class="field-group" id="field-document">
            <label id="label-document" for="input-document"
              >Número de cédula</label
            >
            <div class="input-wrapper">
              <svg
                class="input-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="2" y="5" width="20" height="14" rx="2" />
                <line x1="2" y1="10" x2="22" y2="10" />
              </svg>
              <input
                type="text"
                id="input-document"
                placeholder="1234567890"
                autocomplete="off"
              />
            </div>
          </div>

          <div class="field-group">
            <label for="input-appointment">ID de cita</label>
            <div class="input-wrapper">
              <svg
                class="input-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                <line x1="16" y1="2" x2="16" y2="6" />
                <line x1="8" y1="2" x2="8" y2="6" />
                <line x1="3" y1="10" x2="21" y2="10" />
              </svg>
              <input
                type="number"
                id="input-appointment"
                placeholder="Ej: 1"
                min="1"
              />
            </div>
          </div>

          <div class="form-error" id="form-error"></div>

          <button class="submit-btn" id="submit-btn" onclick="handleLogin()">
            <span id="submit-label">Ingresar a la consulta</span>
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M5 12h14M12 5l7 7-7 7" />
            </svg>
          </button>
        </div>

        <div class="status-bar">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">Listo para conectar</span>
        </div>
      </div>
    </div>

    <!-- ── SALA ── -->
    <div id="screen-room" class="screen">
      <div class="topbar">
        <div class="topbar-left">
          <div class="topbar-logo">MediCall</div>
          <div class="topbar-divider"></div>
          <div class="room-name-tag" id="room-tag">—</div>
        </div>
        <div class="topbar-center" id="user-info-bar">
          <!-- se llena dinámicamente -->
        </div>
        <div class="topbar-right">
          <div class="rec-indicator" id="rec-indicator">REC</div>
          <div class="timer" id="timer">00:00</div>
        </div>
      </div>

      <div id="video-grid">
        <div class="empty-state">
          <div class="connecting-ring"></div>
          <span>Conectando a la sala...</span>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl-btn" id="btn-mic" onclick="toggleMic()">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8" />
          </svg>
          Mic
        </button>

        <button class="ctrl-btn" id="btn-cam" onclick="toggleCam()">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M23 7l-7 5 7 5V7z" />
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
          </svg>
          Cámara
        </button>

        <div class="ctrl-sep"></div>

        <button
          class="ctrl-btn record-btn"
          id="btn-record"
          onclick="toggleRecording()"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="8" />
            <circle cx="12" cy="12" r="3" fill="currentColor" stroke="none" />
          </svg>
          Grabar
        </button>

        <div class="ctrl-sep"></div>

        <button class="ctrl-btn danger" onclick="leave()">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"
            />
          </svg>
          Salir
        </button>

        <div class="participant-count" id="participant-count">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          1 participante
        </div>
      </div>
    </div>

    <div id="toast"></div>
  </body>
</html>
