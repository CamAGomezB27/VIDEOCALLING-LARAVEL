<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Test Videollamada</title>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, sans-serif;
        background: #0f0f0f;
        color: #fff;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
      }

      h2 {
        font-size: 1.1rem;
        font-weight: 500;
        color: #aaa;
      }

      #controls {
        display: flex;
        gap: 10px;
      }

      button {
        padding: 10px 24px;
        border: none;
        border-radius: 8px;
        font-size: 0.95rem;
        cursor: pointer;
        font-weight: 500;
      }

      #btn-patient {
        background: #2563eb;
        color: #fff;
      }
      #btn-doctor {
        background: #059669;
        color: #fff;
      }
      #btn-leave {
        background: #dc2626;
        color: #fff;
        display: none;
      }

      #status {
        font-size: 0.85rem;
        color: #888;
      }

      #video-grid {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
      }

      video {
        width: 360px;
        height: 270px;
        border-radius: 12px;
        background: #1a1a1a;
        object-fit: cover;
      }

      .participant-label {
        font-size: 0.75rem;
        color: #aaa;
        text-align: center;
        margin-top: 4px;
      }

      .video-wrapper {
        display: flex;
        flex-direction: column;
      }
    </style>
  </head>
  <body>
    <h2 id="status">Elige con qué rol conectarte</h2>

    <div id="controls">
      <button id="btn-patient" onclick="connect('patient')">
        Entrar como paciente
      </button>
      <button id="btn-doctor" onclick="connect('doctor')">
        Entrar como médico
      </button>
      <button id="btn-leave" onclick="leave()">Salir</button>
    </div>

    <div id="video-grid"></div>

    <script>
      const API_BASE = "http://localhost:8000/api";
      const APPOINTMENT_ID = 1; // cambia este número por el ID de tu cita

      let room = null;

      async function connect(role) {
        setStatus("Obteniendo token...");

        // 1. Pedir token a Laravel
        const res = await fetch(
          `${API_BASE}/appointments/${APPOINTMENT_ID}/join`,
        );
        const data = await res.json();

        const token =
          role === "patient" ? data.patient_token : data.doctor_token;

        // 2. Crear sala LiveKit
        room = new LivekitClient.Room({
          adaptiveStream: true,
          dynacast: true,
        });

        // 3. Escuchar participantes remotos
        room.on(
          LivekitClient.RoomEvent.TrackSubscribed,
          (track, _pub, participant) => {
            if (track.kind === "video") {
              addVideoElement(track, participant.identity);
            }
          },
        );

        room.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track) => {
          track.detach().forEach((el) => el.parentElement?.remove());
        });

        room.on(LivekitClient.RoomEvent.Disconnected, () => {
          setStatus("Desconectado");
          document.getElementById("btn-leave").style.display = "none";
          document.getElementById("btn-patient").style.display = "inline-block";
          document.getElementById("btn-doctor").style.display = "inline-block";
        });

        // 4. Conectar
        await room.connect(data.livekit_url, token);
        setStatus(`Conectado como ${role} · sala: ${data.room_name}`);

        // 5. Publicar lo que esté disponible (cámara opcional)
        let localTracks = [];

        try {
          localTracks = await LivekitClient.createLocalTracks({
            audio: true,
            video: true,
          });
        } catch (e) {
          setStatus(`Sin cámara, intentando solo audio...`);
          try {
            localTracks = await LivekitClient.createLocalTracks({
              audio: true,
              video: false,
            });
          } catch (e2) {
            setStatus(`Conectado sin audio ni video · sala: ${data.room_name}`);
          }
        }

        for (const track of localTracks) {
          await room.localParticipant.publishTrack(track);
          if (track.kind === "video") {
            addVideoElement(track, `tú (${role})`, true);
          }
        }

        document.getElementById("btn-patient").style.display = "none";
        document.getElementById("btn-doctor").style.display = "none";
        document.getElementById("btn-leave").style.display = "inline-block";
      }

      function addVideoElement(track, identity, muted = false) {
        const wrapper = document.createElement("div");
        wrapper.className = "video-wrapper";
        wrapper.id = `video-${identity}`;

        const videoEl = track.attach();
        videoEl.muted = muted; // mutear el propio audio para evitar eco

        const label = document.createElement("div");
        label.className = "participant-label";
        label.textContent = identity;

        wrapper.appendChild(videoEl);
        wrapper.appendChild(label);
        document.getElementById("video-grid").appendChild(wrapper);
      }

      async function leave() {
        await room?.disconnect();
        document.getElementById("video-grid").innerHTML = "";
      }

      function setStatus(msg) {
        document.getElementById("status").textContent = msg;
      }
    </script>
  </body>
</html>
